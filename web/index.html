<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunar Orbit Explorer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- HUD overlay (right side) -->
  <div id="hud">
    <div class="hud-title">Lunar Orbit Explorer</div>
    <div class="hud-section">
      <span class="hud-label">Altitude</span>
      <span class="hud-value" id="hud-alt">—</span>
      <span class="hud-unit">km</span>
    </div>
    <div class="hud-section">
      <span class="hud-label">Speed</span>
      <span class="hud-value" id="hud-vel">—</span>
      <span class="hud-unit">km/s</span>
    </div>
    <div class="hud-section">
      <span class="hud-label">Elapsed</span>
      <span class="hud-value" id="hud-time">—</span>
      <span class="hud-unit"></span>
    </div>
    <div class="hud-section">
      <span class="hud-label">Period</span>
      <span class="hud-value" id="hud-period">~118.7</span>
      <span class="hud-unit">min</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-controls">
      <button id="btn-play" class="hud-btn active">▶ Play</button>
      <button id="btn-pause" class="hud-btn">⏸ Pause</button>
      <button id="btn-reset" class="hud-btn">↺ Reset</button>
    </div>
    <div class="hud-controls">
      <label class="hud-label" for="warp-slider">Time Warp</label>
      <input type="range" id="warp-slider" min="0" max="5" step="1" value="2" />
      <span class="hud-value" id="warp-label">100×</span>
    </div>
    <div id="status-bar">Loading WASM…</div>
  </div>

  <!-- Force model panel (left side) -->
  <div id="force-panel">
    <div class="hud-title">Force Model</div>
    <div class="force-option">
      <label><input type="radio" name="gravity" value="pointmass" checked /> Point mass only</label>
    </div>
    <div class="force-option">
      <label><input type="radio" name="gravity" value="harmonics" /> Spherical harmonics</label>
      <div class="force-sub" id="sh-controls" style="display:none">
        <label class="hud-label" for="sh-degree">Degree</label>
        <input type="range" id="sh-degree" min="2" max="50" value="20" />
        <span class="hud-value" id="sh-degree-label">20</span>
      </div>
    </div>
    <div class="force-option">
      <label><input type="checkbox" id="chk-earth" /> Earth third-body</label>
    </div>
    <div class="force-option">
      <label><input type="checkbox" id="chk-sun" /> Sun third-body</label>
    </div>
    <div class="hud-divider"></div>

    <!-- Orbital elements readout -->
    <div class="hud-title">Orbital Elements</div>
    <div class="hud-section">
      <span class="hud-label">SMA</span>
      <span class="hud-value" id="oe-sma">—</span>
      <span class="hud-unit">km</span>
    </div>
    <div class="hud-section">
      <span class="hud-label">ECC</span>
      <span class="hud-value" id="oe-ecc">—</span>
      <span class="hud-unit"></span>
    </div>
    <div class="hud-section">
      <span class="hud-label">INC</span>
      <span class="hud-value" id="oe-inc">—</span>
      <span class="hud-unit">°</span>
    </div>
    <div class="hud-section">
      <span class="hud-label">RAAN</span>
      <span class="hud-value" id="oe-raan">—</span>
      <span class="hud-unit">°</span>
    </div>
    <div class="hud-section">
      <span class="hud-label">AoP</span>
      <span class="hud-value" id="oe-argp">—</span>
      <span class="hud-unit">°</span>
    </div>
    <div class="hud-section">
      <span class="hud-label">TA</span>
      <span class="hud-value" id="oe-ta">—</span>
      <span class="hud-unit">°</span>
    </div>
    <div class="hud-divider"></div>

    <!-- Time-series plots -->
    <div class="hud-title">Eccentricity</div>
    <canvas id="plot-ecc" width="220" height="60"></canvas>
    <div class="hud-title" style="margin-top:8px">Altitude (km)</div>
    <canvas id="plot-alt" width="220" height="60"></canvas>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
